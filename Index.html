<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalMaster | Learning Objective Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <header>
            <h1>GoalMaster 🎯</h1>
            <p>Master your learning objectives.</p>
        </header>

        <div id="progress-container">
            <p>Overall Mastery</p>
            <div id="progress-bar-bg">
                <div id="progress-bar-fill"></div>
            </div>
        </div>
        
        <section id="input-section">
            <input type="text" id="goal-input" placeholder="Enter a new learning objective...">
            <button id="add-btn">Add Goal</button>
        </section>

        <ul id="goal-list"></ul>
    </main>

    <script src="app.js"></script>
</body>
</html>
